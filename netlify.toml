[build]
command = "npm ci && npm exec -- nx run web:build --configuration=production --outputStyle=static"
publish = "dist/apps/web"

[build.environment]
NODE_VERSION = "24.14.0"
NPM_VERSION = "11.9.0"
NPM_FLAGS = "--version"

[[headers]]
for = "/assets/*"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/"

[headers.values]
Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
for = "/index.html"

[headers.values]
Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
for = "/deployment.json"

[headers.values]
Cache-Control = "public, max-age=0, must-revalidate"
